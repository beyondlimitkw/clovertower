<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Clover Tower in Jabriya, Kuwait for clinic leasing inquiries, visitor support, location details, and general questions." />
  <meta name="keywords" content="Clover Tower, Mazaya, CloverCenter, مزايا, مركز كلوفر, عيادات الكويت, Doctors Kuwait" />
  <meta name="author" content="Beyond Limit Property Management" />
  <link rel="icon" href="assets/images/logos/clovertower_favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/images/logos/apple-icon.png">
  <!-- Open Graph -->
  <meta property="og:title" content="Contact Clover Tower" />
  <meta property="og:description" content="Get in touch with the Clover Tower team. Visit us in Jabriya, Kuwait." />
  <meta property="og:image" content="https://clover-tower.com/assets/images/logos/opengraph.png" />
  <meta property="og:url" content="https://clover-tower.com/contact.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact Clover Tower" />
  <meta name="twitter:description" content="Get in touch with the Clover Tower team. Visit us in Jabriya, Kuwait." />
  <meta name="twitter:image" content="https://clover-tower.com/assets/images/logos/opengraph.png" />

  <title>Contact - Clover Tower</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="assets/css/clovertower-design-system.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
</head>
<body>
<!-- Optional top banner spacer -->
<section class="bg-light-green py-5 text-center banner-space">
  <div class="container">
    <span class="fw-semibold text-dark small">
      🏥 Now Leasing Premium Clinics at Clover Tower –
      <a href="contact.html" class="text-success text-decoration-underline">Inquire Today</a>
    </span>
  </div>
</section>
<div id="navbar"></div>

<!-- Contact Section -->
<section class="section fullscreen-section py-5 px-3 bg-white py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="fw-bold aos-fade-up">Get in Touch</h1>
      <p class="text-muted aos-fade-up" data-aos-delay="100">For inquiries, leasing opportunities, or support, please use the form or contact details below.</p>
    </div>
    <div class="row gy-4 align-items-center">
      <!-- Contact Form -->
      <div class="col-md-6 aos-fade-up" data-aos-delay="100">
        <form id="contactForm" action="https://formspree.io/f/xwpovddl" method="POST" class="border p-4 rounded-4 shadow-sm">
          <div class="mb-3">
            <label for="contactName" class="visually-hidden">Your Name</label>
            <input id="contactName" type="text" name="name" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="mb-3">
            <label for="contactPhone" class="visually-hidden">Phone Number</label>
            <input id="contactPhone" type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
          </div>
          <div class="mb-3">
            <label for="contactEmail" class="visually-hidden">Your Email (optional)</label>
            <input id="contactEmail" type="email" name="email" class="form-control" placeholder="Your Email (optional)">
          </div>
          <div class="mb-3">
            <label for="contactMessage" class="visually-hidden">Your Message</label>
            <textarea id="contactMessage" name="message" class="form-control" placeholder="Your Message" rows="4" required></textarea>
          </div>
          <div id="formSuccess" class="alert alert-success d-none" role="alert">
            ✅ Your message has been sent. We'll get back to you shortly.
          </div>
          <button type="submit" class="btn btn-success">Send Message</button>
        </form>
      </div>

      <!-- Google Map -->
      <div class="col-md-6 aos-fade-up" data-aos-delay="200">
        <div class="ratio ratio-16x9 rounded-4 overflow-hidden shadow-sm">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3478.6234911753686!2d48.01252837555762!3d29.322718075295022!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3fcf9d001a2dca33%3A0x82f550c4acb35197!2sClover%20tower!5e0!3m2!1sen!2skw!4v1744153712581!5m2!1sen!2skw"
            title="Clover Tower location on Google Maps"
            width="100%" height="100%"
            style="border:0;"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer"></div>
<script>
(function () {
  "use strict";

  const form = document.getElementById("contactForm");
  const successMsg = document.getElementById("formSuccess");
  if (form && successMsg) {
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { "Accept": "application/json" }
        });

        if (!res.ok) throw new Error("Form submission failed");
        successMsg.classList.remove("d-none");
        form.reset();
      } catch (error) {
        form.submit();
      }
    });
  }
})();
</script>
<script src="assets/js/site-shell.js"></script>






<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
