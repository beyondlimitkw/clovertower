<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>
   Contact - Clover Tower
  </title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="assets/css/clovertower-design-system.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="assets/css/clovertower-design-system.css" rel="stylesheet"/>
<link href="assets/css/layout.css" rel="stylesheet"/>
</head>
<body>
<!-- Navbar -->
<div id="navbar">
</div>
<!-- Contact Section -->
<section class="py-5">
<div class="container">
<h2 class="fw-bold text-center mb-4 aos-fade-up" data-aos-delay="0">
     Get in Touch
    </h2>
<div class="row gy-4">
<!-- Contact Info -->
<div class="col-md-6">
<h5 class="fw-bold">
       Contact Information
      </h5>
<p class="aos-fade-up" data-aos-delay="100">
<i class="bi bi-geo-alt-fill me-2">
</i>
       Jabriya, Block 1A, Street 1, Clover Tower, 19th Floor
      </p>
<p>
<i class="bi bi-telephone-fill me-2">
</i>
       +965 9921 8992
      </p>
<p>
<i class="bi bi-envelope-fill me-2">
</i>
       propertymanagement@beyondlimitkw.com
      </p>
</div>
<!-- Google Map -->
<div class="col-md-6">
<div class="ratio ratio-16x9">
<iframe allowfullscreen="" height="450" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3478.6234911753686!2d48.01252837555762!3d29.322718075295022!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3fcf9d001a2dca33%3A0x82f550c4acb35197!2sClover%20tower!5e0!3m2!1sen!2skw!4v1744153712581!5m2!1sen!2skw" style="border:0;" width="600">
</iframe>
</div>
</div>
</div>
</div>
</section>
<!-- Footer -->
<div id="footer">
</div>
<script>
  // Load navbar → footer → then AOS
  fetch("assets/components/navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;

      // Highlight active nav link
      const current = window.location.pathname.split("/").pop();
      document.querySelectorAll(".nav-link").forEach(link => {
        if (link.getAttribute("href") === current) {
          link.classList.add("active");
        }
      });

      // Sticky scroll behavior
      const navbar = document.querySelector('.navbar-glass');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
          navbar?.classList.add('scrolled');
        } else {
          navbar?.classList.remove('scrolled');
        }
      });

      // Load footer
      return fetch("assets/components/footer.html");
    })
    .then(res => res.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;

      // Load AOS assets
      const aosCSS = document.createElement("link");
      aosCSS.rel = "stylesheet";
      aosCSS.href = "https://unpkg.com/aos@2.3.1/dist/aos.css";
      document.head.appendChild(aosCSS);

      const aosJS = document.createElement("script");
      aosJS.src = "https://unpkg.com/aos@2.3.1/dist/aos.js";
      aosJS.onload = () => {
        // After AOS script is loaded, assign data-aos attributes
        const aosMap = {
          "aos-fade": "fade",
          "aos-fade-up": "fade-up",
          "aos-fade-down": "fade-down",
          "aos-fade-left": "fade-left",
          "aos-fade-right": "fade-right",
          "aos-zoom-in": "zoom-in",
          "aos-zoom-out": "zoom-out",
          "aos-slide-up": "slide-up",
          "aos-slide-left": "slide-left"
        };

        Object.keys(aosMap).forEach(cls => {
          document.querySelectorAll(`.${cls}`).forEach(el => {
            el.setAttribute("data-aos", aosMap[cls]);
          });
        });

        AOS.init({
          duration: 800,
          easing: 'ease-out-cubic',
          once: false
        });
      };
      document.body.appendChild(aosJS);
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
