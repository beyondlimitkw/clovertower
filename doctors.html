<!-- Specialty Filter Script -->
<script>
  const filter = document.getElementById('specialtyFilter');
  const items = document.querySelectorAll('#doctorGrid .col');

  filter.addEventListener('change', () => {
    const selected = filter.value;
    items.forEach(item => {
      const specialty = item.dataset.specialty;
      item.style.display = (selected === 'all' || specialty === selected) ? 'block' : 'none';
    });
  });
</script>
<script>
  fetch("assets/components/navbar.html")
   .then(response => response.text())
   .then(data => {
     document.getElementById("navbar").innerHTML = data;

     // Highlight the active nav link
     const current = window.location.pathname.split("/").pop();
     document.querySelectorAll(".nav-link").forEach(link => {
       if (link.getAttribute("href") === current) {
         link.classList.add("active");
       }
     });
   });
 </script>
<script>
  fetch("assets/components/footer.html")
   .then(res => res.text())
   .then(data => document.getElementById("footer").innerHTML = data);
